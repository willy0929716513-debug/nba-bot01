name: NBA Pro Engine Daily 0600

on:
  schedule:
    # 早上 06:00 台灣時間 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch:      # 保持手動觸發功能，方便你隨時測試

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Engine
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python nba_bot.py

      - name: Commit and Push DB change
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add nba_market_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Market DB & Ratings" && git push)
