name: NBA Odds Bot

on:
  schedule:
    - cron: '0 22 * * *' # 每天早上 6:00 執行
  workflow_dispatch:      # 允許手動執行按鈕

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        # 【這裡要改】確保檔名跟你的 Python 檔案一模一樣
        run: python main.py 
