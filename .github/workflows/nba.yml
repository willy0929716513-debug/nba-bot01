name: NBA Odds Bot

on:
  schedule:
    - cron: '0 22 * * *' # 每天早上 6:00 執行 (UTC 22:00)
  workflow_dispatch:      # 手動按鈕啟動

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: read     # 【必改】解決你截圖中的讀取權限問題
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 【必改】升級到 v4 更穩定

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python main.py
