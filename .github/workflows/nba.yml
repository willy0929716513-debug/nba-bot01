name: NBA Pro Engine Daily Run

on:
  schedule:
    - cron: '0 22 * * *' # 台灣時間早上 6 點
  workflow_dispatch:      # 允許你在 App 上點按鈕手動執行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # 讓程式有權限把 nba_market_data.json 存回去
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Engine
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        # ✨ 這裡已經修正為你的檔名 nba_bot.py
        run: python nba_bot.py

      - name: Commit and Push DB change
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add nba_market_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Market DB [skip ci]" && git push)
